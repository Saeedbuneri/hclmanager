<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HCL – Patient History</title>
    <link rel="stylesheet" href="../assets/style.css">
    <script src="../assets/shared.js"></script>
    <script src="../assets/sidebar.js"></script>
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #0ea5e9; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; color: #64748b; font-weight: bold; }
        tr:hover { background: #f1f5f9; }
        .status-badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .status-completed { background: #dcfce7; color: #059669; }
        .status-pending { background: #fef9c3; color: #d97706; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        .search-box button { padding: 10px 20px; background: #0ea5e9; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        /* Modal for Patient Visits */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; overflow-y:auto; padding: 20px 0; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 800px; max-width: 90%; max-height: 80vh; overflow-y: auto; margin: auto; }
        .visit-card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; padding: 15px; }
        .visit-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 10px; }
        .test-check-list { display: flex; flex-direction: column; gap: 8px; }
        .test-check-item { display: flex; align-items: center; gap: 10px; }
        .print-btn { background: #10b981; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <script>initSidebar('patient_history.html')</script>
    <div class="main-content">
        <header>
            <h1>Patient History</h1>
            <p>Search and view past laboratory reports.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="tabTests" onclick="switchTab('tests')">Group by Tests (Receipts)</button>
            <button class="tab-btn" id="tabPatients" onclick="switchTab('patients')">Group by Patients</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by Name, Phone or ID..." onkeyup="if(event.key === 'Enter') performSearch()">
            <button onclick="performSearch()">Search</button>
        </div>

        <table id="historyTable">
            <thead>
                <tr id="tableHeader">
                    <!-- Dynamic Headers -->
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be injected here -->
            </tbody>
        </table>
    </div>

    <!-- Patient Visits Modal -->
    <div id="patientVisitsModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="modalPatientName">Patient Visits</h2>
                <button onclick="closeModal()" style="border:none; background:#ef4444; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Close</button>
            </div>
            <div id="visitsContainer"></div>
        </div>
    </div>

    <script>
        let currentMode = 'tests';

        async function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tabTests').classList.toggle('active', mode === 'tests');
            document.getElementById('tabPatients').classList.toggle('active', mode === 'patients');

            const thead = document.getElementById('tableHeader');
            if (mode === 'tests') {
                thead.innerHTML = `
                    <th>Date</th>
                    <th>Patient Info</th>
                    <th>Contact</th>
                    <th>Sub. Total</th>
                    <th>Status</th>
                    <th>Action</th>
                `;
            } else {
                thead.innerHTML = `
                    <th>Last Visit</th>
                    <th>Patient Name</th>
                    <th>PID</th>
                    <th>Contact</th>
                    <th>Total Visits</th>
                    <th>Action</th>
                `;
            }
            performSearch();
        }

        async function performSearch() {
            const tableBody = document.querySelector('#historyTable tbody');
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>';

            const searchTerm = document.getElementById('searchInput').value;

            try {
                if (currentMode === 'tests') {
                    const records = await window.api.getPatientHistory(searchTerm);
                    tableBody.innerHTML = '';
                    if(records.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#94a3b8;">No records found.</td></tr>';
                        return;
                    }

                    records.forEach(booking => {
                        const dateFormatted = new Date(booking.date).toLocaleString();
                        const isCompleted = booking.status === 'Completed';
                        tableBody.innerHTML += `
                            <tr>
                                <td>${dateFormatted}</td>
                                <td>
                                    <div style="font-weight:bold; color: #0f172a;">${booking.patient_name || 'N/A'}</div>
                                    <div style="font-size:12px; color: #64748b;">ID: ${booking.patient_id}</div>
                                </td>
                                <td>${booking.contact || 'N/A'}</td>
                                <td style="font-weight:bold;">Rs. ${booking.total_amount}</td>
                                <td><span class="status-badge ${isCompleted ? 'status-completed' : 'status-pending'}">${booking.status}</span></td>
                                <td style="display: flex; gap: 5px; flex-wrap: wrap; align-items: center; border-bottom: none;">
                                    <button onclick="window.api.openPrintWindow('db_id=${booking.id}')" style="background:#10b981; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;" title="Print Lab Results Report">Report</button>
                                    <button onclick="printReceipt('${booking.id}', '${encodeURIComponent(booking.patient_name || '')}', '${booking.total_amount}', '${booking.discount || 0}', '${booking.pin || '123456'}', '${booking.patient_id}')" style="background:#0ea5e9; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;" title="Print Initial Receipt">Receipt</button>
                                    <button onclick="revertBookingLocal('${booking.id}')" style="background:#f59e0b; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; ${!isCompleted ? 'opacity:0.5;' : ''}" ${!isCompleted ? 'disabled' : ''}>Edit</button>
                                    <button onclick="deleteBookingLocal('${booking.id}')" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Delete</button>
                                </td>
                            </tr>`;
                    });
                } else {
                    const records = await window.api.getPatientHistory(searchTerm ? searchTerm : "ALL_PATIENTS");
                    tableBody.innerHTML = '';

                    if(records.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#94a3b8;">No patients found.</td></tr>';
                        return;
                    }

                    let patientMap = new Map();
                    if (!searchTerm) {
                        records.forEach(p => patientMap.set(p.patient_id, p));
                    } else {
                        records.forEach(b => {
                            if (!patientMap.has(b.patient_id)) {
                                patientMap.set(b.patient_id, {
                                    patient_id: b.patient_id,
                                    patient_name: b.patient_name,
                                    contact: b.contact,
                                    pin: b.pin,
                                    last_visit: b.date,
                                    total_visits: 1
                                });
                            } else {
                                let p = patientMap.get(b.patient_id);
                                p.total_visits++;
                                if (b.date > p.last_visit) p.last_visit = b.date;
                                if (!p.pin && b.pin) p.pin = b.pin;
                            }
                        });
                    }

                    let patientsAgg = Array.from(patientMap.values()).sort((a,b) => new Date(b.last_visit) - new Date(a.last_visit));

                    patientsAgg.forEach(p => {
                        const dateRaw = p.last_visit ? new Date(p.last_visit) : null;
                        const dateStr = dateRaw ? dateRaw.toLocaleDateString() : 'N/A';
                        const pin = p.pin || '—';
                        tableBody.innerHTML += `
                            <tr>
                                <td>${dateStr}</td>
                                <td>
                                    <div style="font-weight:bold;">${p.patient_name || 'N/A'}</div>
                                    <div style="font-size:11px; color:#2563eb; font-weight:700; margin-top:3px;">🔑 PIN: ${pin}</div>
                                </td>
                                <td>${p.patient_id}</td>
                                <td>${p.contact || 'N/A'}</td>
                                <td><span style="background:#e2e8f0; padding:2px 8px; border-radius:10px; font-weight:bold;">${p.total_visits}</span></td>
                                <td>
                                    <button onclick="openPatientVisits('${p.patient_id}', '${p.patient_name}')" style="background:#8b5cf6; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">Visits/Tests</button>
                                    <button onclick="openEditPatientModal('${p.patient_id}', '${p.patient_name ? p.patient_name.replace(/'/g, "\\'") : ''}')" style="background:#f59e0b; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; margin-left:5px;">Edit Patient</button>
                                    <button onclick="openPatientLedger('${p.patient_id}', '${(p.patient_name||'').replace(/'/g, "\\'")}')" style="background:#0ea5e9; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; margin-left:5px;">💰 Ledger</button>
                                    <button onclick="deletePatientLocal('${p.patient_id}', '${p.patient_name}')" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; margin-left:5px;">Delete</button>
                                </td>
                            </tr>`
                    });
                }
            } catch(e) {
                console.error(e);
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Error loading data</td></tr>';
            }
        }

        async function openPatientVisits(patientId, name) {
            document.getElementById('modalPatientName').innerText = `${name} - Visit History`;
            const container = document.getElementById('visitsContainer');
            container.innerHTML = '<p style="text-align:center;">Loading visits...</p>';
            document.getElementById('patientVisitsModal').style.display = 'flex';

            try {
                const visits = await window.api.getPatientHistory(`VISITS:${patientId}`);
                container.innerHTML = '';

                if (visits.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">No visit history found.</p>';
                    return;
                }

                for (let booking of visits) {
                    const report = await window.api.getBookingReport(booking.id);
                    if (!report || !report.results) continue;

                    const isCompleted = booking.status === 'Completed';
                    const dStr = new Date(booking.date).toLocaleString();

                    let div = document.createElement('div');
                    div.className = 'visit-card';

                    let testsHtml = report.results.map(r => `
                        <label class="test-check-item">
                            <input type="checkbox" class="chk-test-${booking.id}" value="${r.test_id}" checked>
                            <span>${r.test_name}</span>
                        </label>
                    `).join('');

                    div.innerHTML = `
                        <div class="visit-header">
                            <div>
                                <strong style="font-size:16px;">${dStr}</strong>
                                <span class="status-badge ${isCompleted ? 'status-completed' : 'status-pending'}" style="margin-left:10px;">${booking.status}</span>
                            </div>
                            <div>
                                <button class="print-btn" onclick="printSelectedTests('${booking.id}')">Print Selected</button>
                            </div>
                        </div>
                        <div class="test-check-list">
                            ${testsHtml || '<p style="color:#888; font-size:12px;">No specific tests available.</p>'}
                        </div>
                    `;
                    container.appendChild(div);
                }

            } catch (e) {
                console.error(e);
                container.innerHTML = '<p style="color:red; text-align:center;">Error loading visits.</p>';
            }
        }

        function printSelectedTests(bookingId) {
            const checkboxes = document.querySelectorAll(`.chk-test-${bookingId}`);
            const allUncheckedIds = Array.from(checkboxes).filter(c => !c.checked).map(c => c.value);

            let queryParams = { db_id: bookingId };
            if (allUncheckedIds.length > 0) {
                queryParams.hide = allUncheckedIds.join(',');
            }

            if (allUncheckedIds.length === checkboxes.length) {
                alert('Please select at least one test to print.');
                return;
            }

            const urlStr = new URLSearchParams(queryParams).toString();
            window.api.openPrintWindow(urlStr);
        }

        function closeModal() {
            document.getElementById('patientVisitsModal').style.display = 'none';
        }

        async function printReceipt(bookingId, encodedPName, totalAmount, discount, pin, patientId) {
            try {
                const pName = decodeURIComponent(encodedPName);
                // Fetch tests for this specific booking to populate receipt
                const report = await window.api.getBookingReport(bookingId);
                let tests = [];
                if (report && report.results) {
                    tests = report.results.map(r => ({ name: r.test_name, price: r.price }));
                }
                const subtotal = Number(totalAmount) + Number(discount);
                const params = new URLSearchParams({
                    id: patientId || bookingId,
                    pin: pin,
                    name: pName,
                    subtotal: subtotal,
                    discount: discount,
                    total: totalAmount,
                    tests: JSON.stringify(tests)
                });
                window.api.openReceiptWindow(params.toString());
            } catch(e) {
                console.error("Error printing receipt", e);
                alert("Could not print receipt.");
            }
        }

        async function revertBookingLocal(id) {
            if(confirm("Change status to 'Pending' to edit results?")) {
                await window.api.revertBooking(id);
                performSearch();
            }
        }

        async function deleteBookingLocal(id) {
            if(confirm('Are you sure you want to delete this booking entirely? This action cannot be undone.')){
                await window.api.deleteBooking(id);
                performSearch();
            }
        }

        async function deletePatientLocal(patientId, patientName) {
            if(confirm('Are you sure you want to completely delete the patient "' + patientName + '" and ALL of their tests/history? This will also remove them from the cloud and online webapp. This cannot be undone.')) {
                try {
                    const res = await window.api.invoke('deletePatient', patientId);
                    if (res && res.success) {
                        alert('Patient deleted successfully.');
                        performSearch();
                    } else {
                        alert('Failed to delete patient: ' + (res ? res.error : 'Unknown error'));
                    }
                } catch(e) {
                    console.error(e);
                    alert('Error deleting patient.');
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => switchTab('tests'));
    
        // --- EDIT PATIENT LOGIC ---
        async function openEditPatientModal(patientId) {
            const syncDetails = await window.api.getManualSyncDetails(patientId);
            if (syncDetails && syncDetails.success && syncDetails.localPatient) {
                 const p = syncDetails.localPatient;
                 document.getElementById('ep_id').value = p.id;
                 document.getElementById('ep_name').value = p.name;
                 document.getElementById('ep_age').value = p.age || '';
                 document.getElementById('ep_gender').value = p.gender || 'Male';
                 document.getElementById('ep_phone').value = p.phone || '';
                 
                 if (syncDetails.localBookings && syncDetails.localBookings.length > 0) {
                     document.getElementById('ep_pin').value = syncDetails.localBookings[0].pin || '123456';
                 }
                 
                 document.getElementById('editPatientModal').style.display = 'flex';
            } else {
                 alert('Could not pull patient details.');
            }
        }

        function closeEditPatientModal() {
            document.getElementById('editPatientModal').style.display = 'none';
        }

        async function savePatientDetails() {
            const id = document.getElementById('ep_id').value;
            const updates = {
                name: document.getElementById('ep_name').value,
                age: document.getElementById('ep_age').value,
                gender: document.getElementById('ep_gender').value,
                phone: document.getElementById('ep_phone').value,
                pin: document.getElementById('ep_pin').value
            };
            
            closeEditPatientModal();
            let btn = document.getElementById('tabPatients');
            let prevText = btn.innerText;
            btn.innerText = 'Syncing...';
            
            const res = await window.api.updateManualSyncDetails(id, updates);
            btn.innerText = prevText;

            if (res.success) {
                alert('Success! Patient Data & PIN updated locally and on Firebase.');
                performSearch(); 
            } else {
                alert('Update Failed: ' + (res.error || 'Unknown Error'));
            }
        }
    </script>
    
    <!-- Edit Patient Details Modal -->
    <div id="editPatientModal" class="modal">
        <div class="modal-content" style="width: 450px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size:18px;">Edit Patient Details</h2>
                <button onclick="closeEditPatientModal()" style="border:none; background:#ef4444; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Close</button>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input type="hidden" id="ep_id">
                <label>Name</label><input type="text" id="ep_name" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;"><label>Age</label><br><input type="number" id="ep_age" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;"></div>
                    <div style="flex:1;"><label>Gender</label><br>
                        <select id="ep_gender" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                            <option>Male</option><option>Female</option>
                        </select>
                    </div>
                </div>
                <label>Phone / Contact</label><input type="text" id="ep_phone" style="padding:8px; border:1px solid #ccc; border-radius:4px;">
                <label>Online Result PIN</label><input type="text" id="ep_pin" style="padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="Leave blank to not change password">
                <button onclick="savePatientDetails()" style="margin-top:15px; padding:10px; background:#10b981; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Save & Update Firebase</button>
            </div>
        </div>
    </div>
    

    <!-- Patient Ledger Modal -->
    <div id="patientLedgerModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:var(--surface); border-radius:16px; padding:28px; width:620px; max-width:95vw; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-size:18px; font-weight:800;" id="ledgerModalTitle">Patient Ledger</h2>
                <div style="display:flex; gap:8px;">
                    <button onclick="openAddDueFromHistory()" style="background:var(--primary); color:white; border:none; padding:7px 14px; border-radius:7px; cursor:pointer; font-weight:600;">+ Add Due</button>
                    <button onclick="closeLedgerModal()" style="background:#ef4444; color:white; border:none; padding:7px 14px; border-radius:7px; cursor:pointer;">Close</button>
                </div>
            </div>
            <div id="ledgerSummaryBar" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;"></div>
            <div id="ledgerContent">Loading...</div>
        </div>
    </div>

    <!-- Add Due from History Modal -->
    <div id="addDueFromHistoryModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2100; align-items:center; justify-content:center;">
        <div style="background:var(--surface); border-radius:14px; padding:24px; width:360px; max-width:95vw; box-shadow:0 20px 50px rgba(0,0,0,0.25);">
            <h3 style="margin-bottom:16px; font-weight:800;">Add Due</h3>
            <input type="hidden" id="adfh_patient_id">
            <input type="hidden" id="adfh_patient_name">
            <div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">Patient</label>
                <input id="adfh_patient_display" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);" readonly></div>
            <div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">Description</label>
                <input id="adfh_desc" type="text" placeholder="e.g. Lab fee pending" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);"></div>
            <div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">Amount (Rs)</label>
                <input id="adfh_amount" type="number" min="1" placeholder="0" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);"></div>
            <div style="display:flex;gap:10px;margin-top:16px;">
                <button onclick="closeAddDueFromHistoryModal()" style="flex:1;padding:9px;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;font-weight:600;">Cancel</button>
                <button onclick="saveAddDueFromHistory()" style="flex:1;padding:9px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:700;">Save</button>
            </div>
        </div>
    </div>

    <script>
        var _currentLedgerPatientId = null;
        var _currentLedgerPatientName = null;

        async function openPatientLedger(patientId, patientName) {
            _currentLedgerPatientId = patientId;
            _currentLedgerPatientName = patientName;
            document.getElementById('ledgerModalTitle').textContent = 'Dues Ledger - ' + patientName;
            document.getElementById('patientLedgerModal').style.display = 'flex';
            await refreshLedger();
        }
        function closeLedgerModal() { document.getElementById('patientLedgerModal').style.display = 'none'; }

        async function refreshLedger() {
            document.getElementById('ledgerContent').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">Loading...</div>';
            try {
                var dues = await window.api.getPatientDues(_currentLedgerPatientId);
                var totalOwed = dues.reduce(function(s,d){ return s+(d.amount||0); }, 0);
                var totalPaid = dues.reduce(function(s,d){ return s+(d.amount_paid||0); }, 0);
                var balance = totalOwed - totalPaid;
                document.getElementById('ledgerSummaryBar').innerHTML =
                    '<div style="background:var(--surface-2);padding:12px;border-radius:8px;text-align:center;"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">TOTAL OWED</div><div style="font-size:20px;font-weight:800;">Rs ' + totalOwed.toLocaleString() + '</div></div>' +
                    '<div style="background:#dcfce7;padding:12px;border-radius:8px;text-align:center;"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">PAID SO FAR</div><div style="font-size:20px;font-weight:800;color:#059669;">Rs ' + totalPaid.toLocaleString() + '</div></div>' +
                    '<div style="background:' + (balance>0?'#fee2e2':'#dcfce7') + ';padding:12px;border-radius:8px;text-align:center;"><div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:4px;">OUTSTANDING</div><div style="font-size:20px;font-weight:800;color:' + (balance>0?'#dc2626':'#059669') + ';">Rs ' + balance.toLocaleString() + '</div></div>';
                if (!dues.length) { document.getElementById('ledgerContent').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);">No dues recorded. All clear!</div>'; return; }
                var rows = dues.map(function(d) {
                    var bal = (d.amount||0) - (d.amount_paid||0);
                    var sc = d.status==='paid'?'#059669':d.status==='partial'?'#0369a1':'#d97706';
                    var bc = d.status==='paid'?'#dcfce7':d.status==='partial'?'#e0f2fe':'#fef9c3';
                    var dateStr = d.date_added ? new Date(d.date_added).toLocaleDateString('en-GB') : '';
                    return '<tr style="border-bottom:1px solid var(--border);">' +
                        '<td style="padding:10px 12px;">' + dateStr + '</td>' +
                        '<td style="padding:10px 12px;">' + d.description + '</td>' +
                        '<td style="padding:10px 12px;">Rs ' + (d.amount||0).toLocaleString() + '</td>' +
                        '<td style="padding:10px 12px;color:#059669;font-weight:600;">Rs ' + (d.amount_paid||0).toLocaleString() + '</td>' +
                        '<td style="padding:10px 12px;color:#dc2626;font-weight:700;">Rs ' + bal.toLocaleString() + '</td>' +
                        '<td style="padding:10px 12px;"><span style="background:' + bc + ';color:' + sc + ';padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;">' + d.status + '</span></td>' +
                        '<td style="padding:10px 12px;">' +
                            (d.status!=='paid' ? '<button onclick="payLedgerDue(' + d.id + ',' + d.amount + ',' + (d.amount_paid||0) + ')" style="background:#10b981;color:white;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;">Pay</button>' : '') +
                            '<button onclick="deleteLedgerDue(' + d.id + ')" style="background:#ef4444;color:white;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px;margin-left:4px;">X</button>' +
                        '</td></tr>';
                }).join('');
                document.getElementById('ledgerContent').innerHTML = '<table style="width:100%;border-collapse:collapse;font-size:13px;"><thead><tr style="background:var(--surface-2);border-bottom:1px solid var(--border);"><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">DATE</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">DESCRIPTION</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">OWED</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">PAID</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">BALANCE</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">STATUS</th><th style="padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);">ACTION</th></tr></thead><tbody>' + rows + '</tbody></table>';
            } catch(e) { document.getElementById('ledgerContent').innerHTML = '<div style="color:var(--danger);padding:16px;">' + e.message + '</div>'; }
        }

        async function payLedgerDue(dueId, amount, amountPaid) {
            var remaining = amount - amountPaid;
            var input = prompt('Outstanding: Rs ' + remaining + '\n\nEnter amount received:', remaining);
            if (input === null || isNaN(parseFloat(input))) return;
            var res = await window.api.payPatientDue(dueId, parseFloat(input));
            if (res.success) { await refreshLedger(); } else { alert('Failed: ' + (res.error||'')); }
        }
        async function deleteLedgerDue(dueId) {
            if (!confirm('Remove this due entry?')) return;
            await window.api.deletePatientDue(dueId);
            await refreshLedger();
        }
        function openAddDueFromHistory() {
            document.getElementById('adfh_patient_id').value = _currentLedgerPatientId;
            document.getElementById('adfh_patient_name').value = _currentLedgerPatientName;
            document.getElementById('adfh_patient_display').value = _currentLedgerPatientName + ' (' + _currentLedgerPatientId + ')';
            document.getElementById('adfh_desc').value = '';
            document.getElementById('adfh_amount').value = '';
            document.getElementById('addDueFromHistoryModal').style.display = 'flex';
        }
        function closeAddDueFromHistoryModal() { document.getElementById('addDueFromHistoryModal').style.display = 'none'; }
        async function saveAddDueFromHistory() {
            var patientId = document.getElementById('adfh_patient_id').value;
            var patientName = document.getElementById('adfh_patient_name').value;
            var description = document.getElementById('adfh_desc').value.trim();
            var amount = parseFloat(document.getElementById('adfh_amount').value);
            if (!description) { alert('Enter a description.'); return; }
            if (!amount || amount <= 0) { alert('Enter a valid amount.'); return; }
            var res = await window.api.addPatientDue({ patient_id: patientId, patient_name: patientName, description: description, amount: amount, date_added: new Date().toISOString() });
            if (res.success) { closeAddDueFromHistoryModal(); await refreshLedger(); } else { alert('Failed to add due.'); }
        }
    </script>
